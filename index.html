<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="HelpCoctel — Descubre, guarda y mezcla los mejores cócteles del mundo" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
  <title>HelpCoctel</title>
  <script>
    // En producción (Vercel) pon aquí tu backend, ej: https://tu-backend.up.railway.app
    // También puedes setearlo desde consola: localStorage.setItem('hc-backend','https://...')
    window.__HC_BACKEND__ = window.__HC_BACKEND__ || '';
  </script>
</head>
<body>

  <!-- ── CURSOR PERSONALIZADO ─────────────────────────────── -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-dot" id="cursorDot"></div>

  <!-- ── LOADER INICIAL ───────────────────────────────────── -->
  <div class="page-loader" id="pageLoader">
    <div class="loader-logo">
      <span class="loader-hex">⬡</span>
      <span class="loader-text">HelpCoctel</span>
    </div>
    <div class="loader-bar"><div class="loader-fill"></div></div>
  </div>

  <!-- ── HEADER ────────────────────────────────────────────── -->
  <header class="glass-header" id="mainHeader">
    <div class="header-inner">
      <a href="#/" class="header-logo nav-link">
        <span class="logo-hex">⬡</span>
        <span class="logo-name">HelpCoctel</span>
      </a>
      <nav class="header-nav">
        <a href="#/" class="nav-link" data-page="home">Inicio</a>
        <a href="#/search" class="nav-link" data-page="search">Explorar</a>
        <a href="#/favorites" class="nav-link" data-page="favorites">Favoritos</a>
      </nav>
      <div class="header-actions">
        <button class="icon-btn theme-btn" id="themeBtn" title="Cambiar tema">
          <span class="theme-sun">☀</span><span class="theme-moon">☾</span>
        </button>
        <div class="auth-area" id="authArea">
          <!-- Se rellena con JS según sesión -->
        </div>
      </div>
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-nav" id="mobileNav">
      <a href="#/" class="nav-link">Inicio</a>
      <a href="#/search" class="nav-link">Explorar</a>
      <a href="#/favorites" class="nav-link">Favoritos</a>
    </div>
  </header>

  <!-- ── MAIN — donde se inyectan las páginas ─────────────── -->
  <main id="app"></main>

  <!-- ── TOAST de notificaciones ──────────────────────────── -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ── MODAL de detalle de cóctel ───────────────────────── -->
  <div class="modal-bg" id="modalBg">
    <div class="modal-glass" id="modalGlass">
      <button class="modal-close-btn" id="modalCloseBtn">✕</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- ── AUTH DRAWER (login/registro lateral) ─────────────── -->
  <div class="drawer-bg" id="drawerBg">
    <aside class="auth-drawer" id="authDrawer">
      <button class="drawer-close-btn" id="drawerCloseBtn">✕</button>
      <div id="drawerContent"></div>
    </aside>
  </div>

  <!-- ── SCRIPTS ───────────────────────────────────────────── -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="src/api.js"></script>
  <script src="src/auth.js"></script>
  <script src="src/components.js"></script>
  <script src="src/pages.js"></script>
  <script src="src/router.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
